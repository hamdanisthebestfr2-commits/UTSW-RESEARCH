<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Sign in · REF/CHECK AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
  tailwind.config = { darkMode: "class", theme: { extend: {
    colors: {
      "bg": "#060607", "surface": "#101012", "surface-2": "#161618",
      "border-subtle": "rgba(255,255,255,0.09)", "border-strong": "rgba(255,255,255,0.16)",
      "ink": "#F4F4F6", "ink-soft": "#ADADB6", "ink-mute": "#8A8A93",
      "ok": "#7FC8A0", "bad": "#DB8793",
    },
    fontFamily: { display: ["Space Grotesk","sans-serif"], body: ["Inter","sans-serif"], mono: ["JetBrains Mono","monospace"] },
  }}};
</script>
<style>
  body { background: #060607; }
  body::before { content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(800px 500px at 20% -10%, rgba(255,255,255,0.08), transparent 60%),
      radial-gradient(700px 480px at 90% 10%, rgba(190,200,215,0.06), transparent 60%); }
  .glass { background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012));
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.09);
    box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.06), 0 24px 60px -30px rgba(0,0,0,0.8); }
  .btn-primary { position:relative; overflow:hidden; isolation:isolate; color:#0a0a0c;
    background: linear-gradient(180deg,#ffffff,#e7e7ec); border:1px solid rgba(255,255,255,0.6);
    box-shadow: 0 8px 24px -12px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.9);
    transition: transform .2s ease, box-shadow .4s ease; }
  .btn-primary::after { content:""; position:absolute; inset:0; z-index:-1; border-radius:inherit;
    background: linear-gradient(90deg,#818cf8,#c084fc,#f472b6); opacity:0; transition:opacity .45s ease; }
  .btn-primary:hover::after { opacity:1; }
  .btn-primary:hover { box-shadow: 0 14px 38px -10px rgba(168,85,247,0.6); }
  .btn-primary:active { transform: translateY(1px) scale(0.99); }
  .btn-primary:disabled { opacity:.6; cursor:not-allowed; }
  a:focus-visible, button:focus-visible, input:focus-visible { outline:2px solid #fff; outline-offset:2px; border-radius:6px; }
  input { color-scheme: dark; }
</style>
</head>
<body class="bg-bg text-ink font-body antialiased min-h-screen flex flex-col">

  <main class="relative z-10 flex-grow flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-md">
      <!-- brand -->
      <a href="index.html" class="flex items-center justify-center gap-2.5 mb-8 font-display text-2xl font-bold text-ink">
        <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-white to-ink-soft flex items-center justify-center">
          <span class="material-symbols-outlined text-bg text-[20px]" style="font-variation-settings:'FILL' 1;">verified</span>
        </span>
        REF<span class="text-ink-mute font-normal">/</span>CHECK
      </a>

      <div class="glass rounded-2xl p-7 sm:p-8">
        <h1 id="auth-title" class="font-display text-2xl text-white mb-1">Welcome back</h1>
        <p id="auth-subtitle" class="text-sm text-ink-soft mb-6">Sign in to verify your references.</p>

        <!-- Google -->
        <button id="google-btn" type="button"
          class="w-full flex items-center justify-center gap-3 px-4 py-3 rounded-lg bg-white text-[#1f1f1f] font-medium text-sm hover:bg-ink-soft/90 transition-colors active:scale-[0.99]">
          <svg class="w-[18px] h-[18px]" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>

        <div class="flex items-center gap-3 my-5">
          <div class="h-px flex-1 bg-border-subtle"></div>
          <span class="font-mono text-[11px] text-ink-mute uppercase tracking-wider">or</span>
          <div class="h-px flex-1 bg-border-subtle"></div>
        </div>

        <!-- email/password -->
        <form id="auth-form" class="flex flex-col gap-4" novalidate>
          <label class="flex flex-col gap-1.5">
            <span class="text-xs font-medium text-ink-soft">Email</span>
            <input id="email" type="email" autocomplete="email" required placeholder="you@university.edu"
              class="bg-bg border border-border-subtle rounded-lg px-3.5 py-2.5 text-sm text-ink placeholder-ink-mute focus:border-border-strong focus:ring-0 outline-none transition-colors">
          </label>
          <label class="flex flex-col gap-1.5">
            <span class="text-xs font-medium text-ink-soft">Password</span>
            <input id="password" type="password" autocomplete="current-password" required minlength="6" placeholder="••••••••"
              class="bg-bg border border-border-subtle rounded-lg px-3.5 py-2.5 text-sm text-ink placeholder-ink-mute focus:border-border-strong focus:ring-0 outline-none transition-colors">
          </label>

          <div id="auth-message" class="hidden text-xs rounded-lg px-3 py-2.5" role="alert"></div>

          <button id="submit-btn" type="submit"
            class="btn-primary w-full px-4 py-3 rounded-lg font-semibold text-sm flex items-center justify-center gap-2">
            <span id="submit-label">Sign in</span>
          </button>
        </form>

        <p class="text-sm text-ink-soft text-center mt-6">
          <span id="toggle-prompt">Don't have an account?</span>
          <button id="toggle-mode" type="button" class="text-ink font-medium hover:underline">Create one</button>
        </p>
      </div>

      <p class="text-center mt-6"><a href="index.html" class="font-mono text-[11px] text-ink-mute hover:text-ink transition-colors uppercase tracking-wider">← Back to home</a></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=6"></script>
  <script src="auth.js?v=6"></script>
</body>
</html>
