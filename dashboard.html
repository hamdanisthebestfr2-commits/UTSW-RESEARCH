<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Dashboard · REF/CHECK AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
  tailwind.config = { darkMode: "class", theme: { extend: {
    colors: { "bg":"#060607","surface":"#101012","border-subtle":"rgba(255,255,255,0.09)",
      "ink":"#F4F4F6","ink-soft":"#ADADB6","ink-mute":"#8A8A93","ok":"#7FC8A0" },
    fontFamily: { display:["Space Grotesk","sans-serif"], body:["Inter","sans-serif"], mono:["JetBrains Mono","monospace"] },
  }}};
</script>
<style>
  body { background:#060607; }
  body::before { content:""; position:fixed; inset:0; pointer-events:none;
    background: radial-gradient(800px 500px at 50% -10%, rgba(255,255,255,0.07), transparent 60%); }
  .glass { background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.012));
    backdrop-filter: blur(16px); border:1px solid rgba(255,255,255,0.09); }
</style>
</head>
<body class="bg-bg text-ink font-body antialiased min-h-screen">
  <!-- gate while we check the session -->
  <div id="gate" class="min-h-screen flex items-center justify-center">
    <div class="w-7 h-7 rounded-full border-2 border-ink-soft border-t-transparent animate-spin"></div>
  </div>

  <div id="app" class="hidden relative z-10 max-w-3xl mx-auto px-6 py-16">
    <header class="flex items-center justify-between mb-10">
      <a href="index.html" class="flex items-center gap-2.5 font-display text-xl font-bold">
        <span class="w-7 h-7 rounded-lg bg-gradient-to-br from-white to-ink-soft flex items-center justify-center"><span class="material-symbols-outlined text-bg text-[18px]" style="font-variation-settings:'FILL' 1;">verified</span></span>
        REF<span class="text-ink-mute font-normal">/</span>CHECK
      </a>
      <button id="logout-btn" class="text-sm text-ink-soft hover:text-ink transition-colors flex items-center gap-1.5">
        <span class="material-symbols-outlined text-[18px]">logout</span> Sign out
      </button>
    </header>

    <div class="glass rounded-2xl p-8">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-ok/10 border border-ok/20 mb-5">
        <span class="w-2 h-2 rounded-full bg-ok"></span>
        <span class="font-mono text-[11px] text-ok uppercase tracking-wider">Signed in</span>
      </div>
      <h1 class="font-display text-3xl text-white mb-2">Welcome<span id="user-name"></span>.</h1>
      <p class="text-ink-soft mb-6">You're authenticated via Supabase. This is a placeholder workspace — the actual verification app lives here once it's built.</p>
      <div class="rounded-xl border border-border-subtle p-4 font-mono text-xs text-ink-soft">
        <div>account: <span id="user-email" class="text-ink"></span></div>
        <div class="mt-1">user id: <span id="user-id" class="text-ink"></span></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    (async function () {
      const configured = window.SUPABASE_URL && !/YOUR-PROJECT/.test(window.SUPABASE_URL)
        && window.SUPABASE_ANON_KEY && !/YOUR-ANON/.test(window.SUPABASE_ANON_KEY);
      if (!configured) { location.replace("auth.html"); return; }

      const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      const { data } = await sb.auth.getSession();
      const session = data && data.session;
      if (!session) { location.replace("auth.html"); return; }

      const user = session.user;
      const name = (user.user_metadata && (user.user_metadata.full_name || user.user_metadata.name)) || "";
      document.getElementById("user-name").textContent = name ? ", " + name.split(" ")[0] : "";
      document.getElementById("user-email").textContent = user.email || "—";
      document.getElementById("user-id").textContent = user.id;

      document.getElementById("gate").classList.add("hidden");
      document.getElementById("app").classList.remove("hidden");

      document.getElementById("logout-btn").addEventListener("click", async () => {
        await sb.auth.signOut();
        location.replace("index.html");
      });
    })();
  </script>
</body>
</html>
